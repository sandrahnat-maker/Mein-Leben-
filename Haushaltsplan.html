<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Haushaltsplan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#F8F4EF; --surface:#FFF; --border:rgba(160,130,90,.15);
  --accent:#8B6A3E; --g:#5C8A5E; --p:#7B5EA7; --t:#3A8C7C;
  --red:#C0392B; --text:#1C160E; --muted:rgba(60,45,20,.45);
  --step-bg:#FDFAF6; --step-active:#FFF8EE; --step-done:#F0F7F0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text);min-height:100vh;padding-bottom:6rem}

/* HEADER */
header{background:rgba(248,244,239,.97);border-bottom:1px solid var(--border);padding:.75rem 1rem .6rem;position:sticky;top:0;z-index:30;backdrop-filter:blur(12px)}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem}
.htitle{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:.03em}
.hbadge{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:.1rem}
.hright{text-align:right}
.total-min{font-size:1.1rem;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}
.total-lbl{font-size:.55rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

/* WOCHENTAG */
.daystrip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:.05rem 0 .4rem}
.dbtn{background:transparent;border:none;cursor:pointer;padding:.22rem 0;display:flex;flex-direction:column;align-items:center;gap:.18rem}
.dname{font-size:.54rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);transition:color .2s}
.dnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:500;transition:all .2s}
.dbtn.active .dname{color:var(--accent)}
.dbtn.active .dnum{background:var(--accent);color:#fff}
.dbtn.today .dnum{outline:2px solid var(--accent);outline-offset:2px}
.ddot{width:3px;height:3px;border-radius:50%;background:var(--accent);opacity:.3}
.dbtn.active .ddot{opacity:1}

/* MAIN */
main{padding:.8rem .9rem 1rem;max-width:540px;margin:0 auto}

/* PROGRESS */
.prog-row{display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted);margin-bottom:.25rem}
.prog-wrap{background:rgba(160,130,90,.1);border-radius:3px;height:3px;margin-bottom:.8rem;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--g));border-radius:3px;transition:width .4s}

/* AUDIO CONTROLLER */
.audio-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;margin-bottom:.9rem;box-shadow:0 2px 12px rgba(150,110,50,.07)}
.audio-now{margin-bottom:.6rem}
.audio-label{font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.18rem}
.audio-task{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:400;color:var(--text);line-height:1.3;min-height:1.5rem}
.audio-sub{font-size:.67rem;color:var(--muted);margin-top:.12rem;line-height:1.4}
.audio-timer{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.timer-display{font-size:2rem;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1}
.timer-of{font-size:.6rem;color:var(--muted);margin-top:.15rem}
.timer-bar-wrap{flex:1;margin-left:.8rem}
.timer-bar-bg{background:rgba(160,130,90,.1);border-radius:4px;height:6px;overflow:hidden}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--g));border-radius:4px;transition:width .5s linear}
.next-label{font-size:.58rem;color:var(--muted);margin-top:.3rem}
.audio-btns{display:flex;gap:.5rem}
.btn-main{flex:1;padding:.65rem;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.btn-main:active{transform:scale(.97)}
.btn-main.running{background:var(--g)}
.btn-main.done-all{background:#2E7D4F}
.btn-skip{padding:.65rem .8rem;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-skip:active{background:rgba(0,0,0,.04)}
.btn-prev{padding:.65rem .8rem;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .15s}
.voice-bar{display:flex;align-items:center;justify-content:space-between;margin-top:.55rem;padding-top:.55rem;border-top:1px solid var(--border)}
.voice-lbl{font-size:.6rem;color:var(--muted)}
.voice-toggle{display:flex;align-items:center;gap:.5rem}
.toggle-sw{width:32px;height:18px;border-radius:9px;background:rgba(160,130,90,.2);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:var(--accent)}
.toggle-sw::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-sw.on::after{left:16px}

/* ── MICRO-STEPS PANEL ── */
.steps-panel{background:var(--surface);border:1px solid rgba(139,106,62,.25);border-radius:14px;margin-bottom:.9rem;overflow:hidden;box-shadow:0 2px 16px rgba(139,106,62,.08);position:relative;z-index:10}
.steps-panel.hidden{display:none!important}
.steps-header{padding:.75rem 1rem .6rem;background:rgba(139,106,62,.06);border-bottom:1px solid rgba(139,106,62,.12)}
.steps-task-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--text)}
.steps-meta{font-size:.6rem;color:var(--muted);margin-top:.1rem}
.steps-progress{display:flex;align-items:center;gap:.5rem;margin-top:.5rem}
.steps-prog-bar{flex:1;height:4px;background:rgba(139,106,62,.1);border-radius:3px;overflow:hidden}
.steps-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--g));border-radius:3px;transition:width .3s}
.steps-prog-lbl{font-size:.58rem;color:var(--accent);font-weight:600;white-space:nowrap}

/* UTENSILIEN */
.utensils-block{padding:.65rem 1rem;border-bottom:1px solid rgba(139,106,62,.1);background:rgba(255,249,240,.5)}
.utensils-label{font-size:.54rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem}
.utensils-list{display:flex;flex-wrap:wrap;gap:.3rem}
.utensil-chip{background:#FFF3E0;border:1px solid rgba(139,106,62,.2);border-radius:6px;padding:.18rem .45rem;font-size:.66rem;font-weight:500;color:var(--accent);display:flex;align-items:center;gap:.25rem}
.utensil-chip.got{background:#E8F5E9;border-color:rgba(92,138,94,.3);color:var(--g)}
.utensil-chip.got::before{content:'✓ '}

/* EINZELNE STEPS */
.step-list{padding:.5rem .7rem}
.step-item{display:flex;gap:.6rem;padding:.55rem .5rem;border-radius:9px;margin-bottom:.25rem;transition:all .2s;cursor:pointer;align-items:flex-start}
.step-item.step-active{background:var(--step-active);border:1px solid rgba(139,106,62,.25)}
.step-item.step-done{background:var(--step-done);opacity:.65}
.step-item.step-pending{background:transparent}
.step-nr{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0;margin-top:.05rem;transition:all .2s}
.step-nr.nr-active{background:var(--accent);color:#fff}
.step-nr.nr-done{background:var(--g);color:#fff}
.step-nr.nr-pending{background:rgba(139,106,62,.1);color:var(--muted)}
.step-content{flex:1;min-width:0}
.step-text{font-size:.8rem;font-weight:500;line-height:1.4;color:var(--text)}
.step-item.step-done .step-text{text-decoration:line-through;color:var(--muted)}
.step-item.step-active .step-text{font-weight:600;color:var(--accent)}
.step-detail{font-size:.67rem;color:var(--muted);margin-top:.2rem;line-height:1.45;font-style:italic}
.step-btns{display:flex;gap:.4rem;margin-top:.55rem;padding:0 .5rem .5rem}
.btn-step-done{flex:1;padding:.55rem;border:none;border-radius:9px;background:var(--accent);color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-step-done:active{transform:scale(.97)}
.btn-step-done.done-step{background:var(--g)}
.btn-step-back{padding:.55rem .75rem;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;font-family:inherit}
.btn-step-skip-task{padding:.55rem .75rem;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;font-family:inherit}

/* ALL DONE WITHIN STEPS */
.steps-all-done{padding:1rem;text-align:center;display:none}
.steps-all-done.show{display:block}
.steps-all-done .check-big{font-size:2rem;margin-bottom:.3rem}
.steps-all-done p{font-size:.75rem;color:var(--muted)}

/* AUFGABENLISTE */
.section-day{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:.85rem 0 .4rem .05rem}
.task-row{display:flex;align-items:center;gap:.55rem;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.5rem .7rem;margin-bottom:.3rem;transition:all .2s;position:relative;overflow:hidden;cursor:pointer}
.task-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:9px 0 0 9px}
.task-row.current::before{background:var(--accent);width:4px}
.task-row.current{border-color:rgba(139,106,62,.4);background:rgba(251,240,224,.4)}
.task-row.done-t{opacity:.38}
.task-row.done-t .tname{text-decoration:line-through}
.task-row.monthly::before{background:var(--p)}
.tnr{font-size:.6rem;color:var(--muted);width:1.2rem;flex-shrink:0;text-align:center}
.tinfo2{flex:1;min-width:0}
.tname{font-size:.79rem;font-weight:500;line-height:1.3}
.ttip2{font-size:.64rem;color:var(--muted);margin-top:.05rem;line-height:1.35}
.tmin2{font-size:.56rem;color:var(--accent);font-weight:600;flex-shrink:0;background:rgba(139,106,62,.08);padding:.07rem .3rem;border-radius:5px;white-space:nowrap}
.freq-chip{display:inline-flex;font-size:.52rem;background:#F0E8FB;color:#7B5EA7;padding:.05rem .32rem;border-radius:5px;margin-left:.25rem;font-weight:600;vertical-align:middle}
.steps-badge{font-size:.52rem;background:rgba(139,106,62,.1);color:var(--accent);padding:.05rem .32rem;border-radius:5px;margin-left:.25rem;font-weight:600;vertical-align:middle}

/* DONE BANNER */
.done-banner{background:linear-gradient(135deg,#2E7D4F,#3A8C7C);border-radius:14px;padding:1.2rem 1rem;text-align:center;margin-bottom:.8rem;display:none}
.done-banner.show{display:block}
.done-banner h2{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:#fff;font-weight:400;margin-bottom:.3rem}
.done-banner p{font-size:.72rem;color:rgba(255,255,255,.8)}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div>
      <div class="htitle">🏠 Haushaltsblock</div>
      <div class="hbadge">Schritt für Schritt · max. 30 Min.</div>
    </div>
    <div class="hright">
      <div class="total-min" id="totalMin">0</div>
      <div class="total-lbl">Min heute</div>
    </div>
  </div>
  <div class="daystrip" id="ds"></div>
</header>
<main>
  <div class="prog-row"><span id="plbl">0 von 0 erledigt</span><span id="ppct">0%</span></div>
  <div class="prog-wrap"><div class="prog-fill" id="pb" style="width:0%"></div></div>

  <!-- KLASSISCHE STEUERUNG -->
  <div class="audio-card" id="audioCard">
    <div class="audio-now">
      <div class="audio-label">Aktuelle Aufgabe</div>
      <div class="audio-task" id="curTask">Tippe Start zum Beginnen</div>
      <div class="audio-sub" id="curTip"></div>
    </div>
    <div class="audio-timer">
      <div>
        <div class="timer-display" id="timerDisp">0:00</div>
        <div class="timer-of" id="timerOf"></div>
      </div>
      <div class="timer-bar-wrap">
        <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerBar" style="width:0%"></div></div>
        <div class="next-label" id="nextLbl"></div>
      </div>
    </div>
    <div class="audio-btns">
      <button class="btn-prev" id="btnPrev" onclick="prevTask()">⏮</button>
      <button class="btn-main" id="btnMain" onclick="mainAction()">▶ Start</button>
      <button class="btn-skip" id="btnSkip" onclick="skipTask()">⏭︎</button>
    </div>
    <div class="voice-bar">
      <span class="voice-lbl" id="voiceLbl">🔈 Ansage: Aus</span>
      <div class="voice-toggle">
        <button class="toggle-sw" id="voiceSw" onclick="toggleVoice()"></button>
        <span style="font-size:.62rem;color:var(--muted)">Ansage</span>
      </div>
    </div>
  </div>

  <!-- MICRO-STEPS PANEL (wird dynamisch befüllt) -->
  <div class="steps-panel hidden" id="stepsPanel">
    <div class="steps-header">
      <div class="steps-task-name" id="stTaskName"></div>
      <div class="steps-meta" id="stTaskMeta"></div>
      <div class="steps-progress">
        <div class="steps-prog-bar"><div class="steps-prog-fill" id="stProgFill" style="width:0%"></div></div>
        <div class="steps-prog-lbl" id="stProgLbl">0/0</div>
      </div>
    </div>
    <div class="utensils-block hidden" id="utensilsBlock">
      <div class="utensils-label">🧹 Benötigte Utensilien</div>
      <div class="utensils-list" id="utensilsList"></div>
    </div>
    <div class="step-list" id="stepList"></div>
    <div class="steps-all-done" id="stepsAllDone">
      <div class="check-big">✅</div>
      <p>Aufgabe erledigt!</p>
    </div>
    <div class="step-btns">
      <button class="btn-step-back" id="btnStepBack" onclick="stepBack()">← Zurück</button>
      <button class="btn-step-done" id="btnStepNext" onclick="stepNext()">✓ Schritt erledigt</button>
      <button class="btn-step-skip-task" onclick="skipFromSteps()">Überspringen ⏭</button>
    </div>
  </div>

  <div class="done-banner" id="doneBanner">
    <h2>✨ Fertig!</h2>
    <p id="doneText">Alle Aufgaben erledigt.</p>
  </div>

  <div id="taskList"></div>
</main>
<script>
// ── MICRO-STEPS DATEN ─────────────────────────────────────────────────────
// Jede Aufgabe hat: utensilien[], steps[]
// Jeder Step: {text, detail (optional)}
var STEPS = {
  // LÜFTEN
  5: {
    utensilien: [],
    steps: [
      {text: "Schlafzimmer-Fenster öffnen", detail: "Griff ganz drehen – auf Kipp oder ganz auf"},
      {text: "Wohnzimmer-Fenster öffnen", detail: "Querlüften: gegenüberliegende Fenster öffnen schafft Durchzug"},
      {text: "Küchen-Fenster öffnen", detail: "Auch den Dunstabzug kurz einschalten wenn vorhanden"},
      {text: "Badezimmer-Tür aufmachen", detail: "So lüftet auch das Bad ohne Fenster mit aus"},
      {text: "5 Minuten warten", detail: "Jetzt schon Heizung abdrehen – spart Energie!"},
      {text: "Alle Fenster wieder schließen", detail: "Alle Zimmer kontrollieren – keines vergessen"},
    ]
  },
  // HEIZUNG
  6: {
    utensilien: [],
    steps: [
      {text: "Schlafzimmer-Heizkörper auf 0 oder Stern ❄️", detail: "Während der Lüftung nicht heizen – Energie sparen"},
      {text: "Wohnzimmer-Heizkörper auf 0 oder Stern ❄️", detail: "Nur solange die Fenster offen sind"},
      {text: "Küche – Heizkörper prüfen und abstellen", detail: "Falls vorhanden"},
      {text: "Nach dem Lüften: Heizung wieder anstellen", detail: "Auf gewünschte Stufe zurückdrehen"},
    ]
  },
  // KATZENKLO
  3: {
    utensilien: ["Schaufel / Sieb", "Müllbeutel", "Frisches Katzenstreu", "Ggf. Handschuhe"],
    steps: [
      {text: "Müllbeutel bereitlegen", detail: "Einen kleinen Beutel oder alten Plastiksack nehmen"},
      {text: "Klumpen und Häufchen mit der Siebschaufel heraussieben", detail: "Eimer oder Beutel direkt darunterhalten"},
      {text: "Beutel gut zuknoten", detail: "Geruchsdicht verknoten, nicht zu voll füllen"},
      {text: "Beutel zum Mülleimer bringen", detail: "Am besten gleich in den Gang-Mülleimer"},
      {text: "Frisches Streu nachfüllen", detail: "Ca. 3–4 cm Schicht – nicht zu wenig, dann klumpt es schlecht"},
      {text: "Schaufel kurz abwischen oder abspülen", detail: "Mit Zeitungspapier abstreifen oder kurz abspülen"},
    ]
  },
  // BETT MACHEN
  1: {
    utensilien: [],
    steps: [
      {text: "Decke zurückschlagen – Matratze auslüften lassen", detail: "Kurz offen lassen während du die Polster machst"},
      {text: "Polster aufschütteln und zurechtlegen", detail: "Kräftig schütteln – Federn oder Füllung verteilen sich"},
      {text: "Leintuch glattziehen", detail: "Falten rausziehen, Ecken einstecken"},
      {text: "Decke auflegen und glattstreichen", detail: "Gleichmäßig verteilen, Überhang auf beiden Seiten gleich"},
      {text: "Zierkissen oder zweite Decke drapieren", detail: "Falls vorhanden – macht's ordentlicher"},
    ]
  },
  // KÜCHE AUFRÄUMEN
  2: {
    utensilien: ["Mikrofasertuch (feucht)", "Allzweckreiniger oder Essigreiniger", "Küchenrolle"],
    steps: [
      {text: "Geschirr vom Vortag in die Spülmaschine räumen", detail: "Oder in die Spüle stapeln wenn noch dreckig"},
      {text: "Arbeitsfläche links von der Spüle abräumen", detail: "Alles was nicht dorthin gehört, weggeben"},
      {text: "Arbeitsfläche links abwischen", detail: "Nasses Tuch mit etwas Reiniger – Krümel und Flecken weg"},
      {text: "Arbeitsfläche rechts vom Herd abräumen und abwischen", detail: "Gleich vorgehen"},
      {text: "Herdplatten abwischen", detail: "Lauwarmes Wasser + Tuch – bei hartnäckigem: Backofenspray kurz einwirken"},
      {text: "Herdrahmen und Seiten abwischen", detail: "Oft vergessen – Fettspritzer sammeln sich hier"},
      {text: "Spüle kurz auswischen", detail: "Mit feuchtem Tuch oder Schwamm kurz durchwischen"},
    ]
  },
  // WÄSCHE STARTEN
  22: {
    utensilien: ["Waschmittel (flüssig oder Pulver)", "Weichspüler (optional)", "Wäschekorb"],
    steps: [
      {text: "Wäschekorb holen und zur Waschmaschine bringen", detail: ""},
      {text: "Wäsche sortieren – nur die richtige Farbe heute einladen", detail: "Heute: sieh auf den Wochenplan welche Farbe dran ist"},
      {text: "Wäsche in die Trommel laden", detail: "Nicht zu voll – Trommel sollte noch eine Handbreit Platz haben"},
      {text: "Waschmittel einfüllen", detail: "In die Schublade: Hauptwäsche-Fach (II) – Dosierung laut Packung"},
      {text: "Weichspüler einfüllen (optional)", detail: "In das ✿-Fach – nicht zu viel, sonst Rückstände"},
      {text: "Richtiges Programm wählen und starten", detail: "Dunkel: 30°, Hell: 40–60°, Bunt: 40° – Schontrommel wenn empfindlich"},
    ]
  },
  // WOHNZIMMER STAUB
  10: {
    utensilien: ["Staubtuch oder Mikrofasertuch trocken", "Ev. Glasreiniger für TV"],
    steps: [
      {text: "Staubtuch nehmen – trockenes Mikrofasertuch", detail: "Kein feuchtes Tuch – Staub wird sonst verschmiert"},
      {text: "Obere Regalböden abwischen", detail: "Von links nach rechts, von oben nach unten"},
      {text: "Bücher/Deko kurz wegheben und darunter wischen", detail: "Nur kurz – nicht alles ausräumen"},
      {text: "TV-Bildschirm abwischen", detail: "Nur trockenes Mikrofasertuch – kein Spray direkt auf den Schirm!"},
      {text: "TV-Standfuß und dahinter wischen", detail: "Kabel nicht verheddern"},
      {text: "Couchtisch abwischen", detail: "Alles kurz wegschieben, Tisch komplett wischen"},
      {text: "Fensterbrett abwischen", detail: "Oft voller Staub – nicht vergessen"},
    ]
  },
  // WOHNZIMMER SAUGEN
  11: {
    utensilien: ["Staubsauger", "Ev. Polsteraufsatz"],
    steps: [
      {text: "Staubsauger holen und anschließen", detail: "Richtige Düse: breite Bodendüse für Hartboden oder Teppich"},
      {text: "Couch-Kissen abnehmen und auf die Seite legen", detail: "So kommt man an den Boden darunter"},
      {text: "Unter der Couch saugen", detail: "Düse flach einführen – hier sammeln sich Haare und Staub!"},
      {text: "Couch selbst absaugen (Sitz und Lehne)", detail: "Polsteraufsatz verwenden wenn vorhanden"},
      {text: "Unter den Sesseln saugen", detail: "Sessel kurz zur Seite schieben wenn möglich"},

function loadVoices() {
  if (!synth) return;
  var voices = synth.getVoices();
  var pref = ['Anna','Helena','Katrin','Marlene','Google Deutsch'];
  germanVoice = null;
  for (var pi=0; pi<pref.length; pi++) {
    for (var vi=0; vi<voices.length; vi++) {
      if (voices[vi].name.indexOf(pref[pi]) >= 0) { germanVoice = voices[vi]; break; }
    }
    if (germanVoice) break;
  }
  if (!germanVoice) {
    for (var vi2=0; vi2<voices.length; vi2++) {
      if (voices[vi2].lang && voices[vi2].lang.startsWith('de')) { germanVoice = voices[vi2]; break; }
    }
  }
  var lbl = document.getElementById('voiceLbl');
  if (lbl) lbl.textContent = voiceOn ? (germanVoice ? '🔊 Ansage: An – '+germanVoice.name.split(' ')[0] : '🔊 Ansage: An') : '🔈 Ansage: Aus';
}
if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}
setTimeout(loadVoices, 500);

function speak(text) {
  if (!voiceOn || !synth) return;
  try {
    synth.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE'; u.rate = 0.9; u.pitch = 1.0; u.volume = 1.0;
    if (germanVoice) u.voice = germanVoice;
    synth.speak(u);
  } catch(e) {}
}

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) checked = JSON.parse(raw);
    var sd = localStorage.getItem(KEY+'_d');
    var td = today.toISOString().slice(0,10);
    if (sd !== td) {
      var nc = {};
      for (var k in checked) { if (k.indexOf('m_')===0) nc[k]=checked[k]; }
      checked = nc;
      save(); localStorage.setItem(KEY+'_d', td);
    }
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(checked)); } catch(e){}
  try { if(window.parent) window.parent._haushalt_data = JSON.stringify(checked); } catch(e){}
}
function isDone(id, monthly) { return !!checked[(monthly?'m_':'t_')+id]; }
function setDone(id, monthly, val) { checked[(monthly?'m_':'t_')+id] = val; save(); }

function getTasks() {
  var out = [];
  var lueften = DAILY.find(function(t){ return t.id === 5; });
  if (lueften) out.push({task:lueften, monthly:false});
  if (WAESCHE_DAYS.indexOf(selDay) >= 0) {
    var wt = WAESCHE_TYPES[selDay];
    var wtask = wt ? {id:22, t:wt.t, m:5, tip:wt.tip, voice:wt.voice} : WAESCHE_TASK;
    out.push({task:wtask, monthly:false});
  }
  var weekly = WEEKLY[selDay] || [];
  weekly.forEach(function(t){ out.push({task:t, monthly:false}); });
  DAILY.filter(function(t){ return t.id !== 5; }).forEach(function(t){ out.push({task:t, monthly:false}); });
  return out;
}

    return dow === selDay;
  });

// ── MICRO-STEPS ───────────────────────────────────────────────────────────
function openSteps(taskId) {
  var data = STEPS[taskId];
  if (!data) return; // kein Step-Modus wenn keine Daten

  stepsMode = true;
  stepsTaskId = taskId;

  // Ersten nicht fertigen Step finden
  stepsCurrentStep = 0;
  for (var i=0; i<data.steps.length; i++) {
    if (!stepsDone[taskId+'_'+i]) { stepsCurrentStep = i; break; }
    if (i === data.steps.length-1) stepsCurrentStep = data.steps.length; // alle fertig
  }

  renderStepsPanel();
  document.getElementById('stepsPanel').classList.remove('hidden');
  document.getElementById('stepsPanel').scrollIntoView({behavior:'smooth', block:'nearest'});

  if (voiceOn) {
    var task = findTask(taskId);
    if (task && data.steps[stepsCurrentStep]) {
      speak('Schritt ' + (stepsCurrentStep+1) + ': ' + data.steps[stepsCurrentStep].text);
    }
  }
}

function findTask(id) {
  var all = getTasks().concat(MONTHLY.map(function(t){ return {task:t, monthly:true}; }));
  for (var i=0; i<all.length; i++) if (all[i].task.id === id) return all[i];
  return null;
}

function renderStepsPanel() {
  var data = STEPS[stepsTaskId];
  if (!data) return;
  var entry = findTask(stepsTaskId);
  var taskName = entry ? entry.task.t : '';
  var totalSteps = data.steps.length;
  var doneCount = 0;
  for (var i=0; i<totalSteps; i++) if (stepsDone[stepsTaskId+'_'+i]) doneCount++;

  document.getElementById('stTaskName').textContent = taskName;
  document.getElementById('stTaskMeta').textContent = totalSteps + ' Schritte';
  var pct = totalSteps > 0 ? Math.round(doneCount/totalSteps*100) : 0;
  document.getElementById('stProgFill').style.width = pct + '%';
  document.getElementById('stProgLbl').textContent = doneCount + '/' + totalSteps;

  // Utensilien
  var uBlock = document.getElementById('utensilsBlock');
  var uList = document.getElementById('utensilsList');
  if (data.utensilien && data.utensilien.length > 0) {
    uBlock.classList.remove('hidden');
    uList.innerHTML = data.utensilien.map(function(u){
      return '<span class="utensil-chip">🧹 '+u+'</span>';
    }).join('');
  } else {
    uBlock.classList.add('hidden');
  }

  // Steps
  var stList = document.getElementById('stepList');
  var h = '';
  for (var i=0; i<totalSteps; i++) {
    var step = data.steps[i];
    var isDoneStep = !!stepsDone[stepsTaskId+'_'+i];
    var isActive = (i === stepsCurrentStep) && !isDoneStep;
    var cls = isDoneStep ? 'step-done' : (isActive ? 'step-active' : 'step-pending');
    var nrCls = isDoneStep ? 'nr-done' : (isActive ? 'nr-active' : 'nr-pending');
    h += '<div class="step-item '+cls+'" onclick="jumpStep('+i+')">'
      + '<div class="step-nr '+nrCls+'">'+(isDoneStep?'✓':(i+1))+'</div>'
      + '<div class="step-content">'
      + '<div class="step-text">'+step.text+'</div>'
      + (step.detail ? '<div class="step-detail">'+step.detail+'</div>' : '')
      + '</div>'
      + '</div>';
  }
  stList.innerHTML = h;

  // Alle fertig?
  var allDone = doneCount >= totalSteps;
  document.getElementById('stepsAllDone').className = 'steps-all-done' + (allDone ? ' show' : '');
  var btnNext = document.getElementById('btnStepNext');
  if (allDone) {
    btnNext.textContent = '✅ Aufgabe abschließen';
    btnNext.className = 'btn-step-done done-step';
  } else {
    btnNext.textContent = '✓ Schritt erledigt';
    btnNext.className = 'btn-step-done';
  }
}

function stepNext() {
  var data = STEPS[stepsTaskId];
  if (!data) return;
  var totalSteps = data.steps.length;

  // Prüfen ob alle fertig
  var allDone = true;
  for (var i=0; i<totalSteps; i++) if (!stepsDone[stepsTaskId+'_'+i]) { allDone = false; break; }

  if (allDone) {
    // Aufgabe als erledigt markieren
    setDone(stepsTaskId, false, true);
    closeSteps();
    renderProgress();
    renderList();
    // Nächste Aufgabe starten
    if (isRunning) {
      curIdx++;
      var next = getNextUndone(curIdx);
      if (next === -1) { finishAll(); } else { curIdx = next; startTask(curIdx); }
    }
    return;
  }

  // Aktuellen Step als fertig markieren
  if (stepsCurrentStep < totalSteps) {
    stepsDone[stepsTaskId+'_'+stepsCurrentStep] = true;
  }

  // Nächsten offenen Step finden
  for (var i=stepsCurrentStep+1; i<totalSteps; i++) {
    if (!stepsDone[stepsTaskId+'_'+i]) { stepsCurrentStep = i; break; }
    if (i === totalSteps-1) stepsCurrentStep = totalSteps; // alle fertig
  }

  renderStepsPanel();

  // Vorlesen
  if (voiceOn && data.steps[stepsCurrentStep]) {
    speak('Schritt '+(stepsCurrentStep+1)+': '+data.steps[stepsCurrentStep].text);
  }

  // Auto-scroll zum aktiven Step
  setTimeout(function(){
    var active = document.querySelector('.step-active');
    if (active) active.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);
}

function stepBack() {
  // Letzten erledigten Step rückgängig
  var data = STEPS[stepsTaskId];
  if (!data) return;
  if (stepsCurrentStep > 0) {
    stepsDone[stepsTaskId+'_'+(stepsCurrentStep-1)] = false;
    stepsCurrentStep = Math.max(0, stepsCurrentStep-1);
  }
  renderStepsPanel();
}

function jumpStep(idx) {
  stepsCurrentStep = idx;
  renderStepsPanel();
}

function closeSteps() {
  stepsMode = false;
  document.getElementById('stepsPanel').classList.add('hidden');
}

function skipFromSteps() {
  closeSteps();
  skipTask();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function getNextUndone(from) {
  var tasks = getTasks();
  for (var i = from; i < tasks.length; i++) {
    if (!isDone(tasks[i].task.id, false)) return i;
  }
  return -1;
}

function mainAction() {
  if (curIdx === -1 || !isRunning) { startBlock(); } else { togglePause(); }
}

function startBlock() {
  if (isRunning && !isPaused) return;
  var tasks = getTasks();
  if (curIdx === -1) curIdx = 0;
  var next = getNextUndone(curIdx);
  if (next === -1) { finishAll(); return; }
  curIdx = next;
  isRunning = true; isPaused = false;
  startTask(curIdx);
}

function startTask(idx) {
  var tasks = getTasks();
  if (idx >= tasks.length) { finishAll(); return; }
  var entry = tasks[idx];
  var t = entry.task;
  timerTotal = t.m * 60;
  timerSec = 0;

  document.getElementById('curTask').textContent = t.t;
  document.getElementById('curTip').textContent = t.tip || '';
  document.getElementById('timerOf').textContent = 'von ' + t.m + ' Min';

  var nextEntry = null;
  for (var i = idx+1; i < tasks.length; i++) {
    if (!isDone(tasks[i].task.id, false)) { nextEntry = tasks[i]; break; }
  }
  document.getElementById('nextLbl').textContent = nextEntry ? 'Danach: ' + nextEntry.task.t : 'Letzte Aufgabe!';

  var btn = document.getElementById('btnMain');
  btn.className = 'btn-main running';
  btn.innerHTML = '⏸ Pause';

  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tickTimer, 1000);

  if (voiceOn) speak(t.voice || t.t + '. ' + t.m + ' Minuten.');

  // Micro-Steps automatisch öffnen wenn vorhanden
  var stData = STEPS[t.id];
  if (stData) {
    stepsDone = {}; // Steps zurücksetzen beim Start
    stepsCurrentStep = 0;
    openSteps(t.id);
  } else {
    closeSteps();
  }

  updateTimerUI();
  renderList();
}

function tickTimer() {
  if (isPaused) return;
  timerSec++;
  updateTimerUI();
  if (timerSec >= timerTotal) {
    clearInterval(timerInterval);
    var tasks = getTasks();
    if (curIdx < tasks.length) {
      setDone(tasks[curIdx].task.id, false, true);
      if (voiceOn) {
        setTimeout(function() {
          var tasks2 = getTasks();
          var next = getNextUndone(curIdx+1);
          if (next === -1) { speak('Fertig! Alle Aufgaben erledigt. Großartig!'); }
          else { speak('Zeit abgelaufen. Weiter mit: ' + tasks2[next].task.t); }
        }, 300);
      }
    }
    curIdx++;
    var next2 = getNextUndone(curIdx);
    if (next2 === -1) { finishAll(); }
    else { curIdx = next2; setTimeout(function(){ startTask(curIdx); }, 800); }
    renderProgress(); renderList();
  }
}

function updateTimerUI() {
  var rem = Math.max(0, timerTotal - timerSec);
  var m = Math.floor(rem/60), s = rem%60;
  document.getElementById('timerDisp').textContent = m + ':' + (s<10?'0':'')+s;
  var pct = timerTotal > 0 ? Math.min(100, timerSec/timerTotal*100) : 0;
  document.getElementById('timerBar').style.width = pct + '%';
}

function togglePause() {
  isPaused = !isPaused;
  var btn = document.getElementById('btnMain');
  if (isPaused) { btn.className='btn-main'; btn.innerHTML='▶ Weiter'; if (voiceOn) speak('Pause.'); }
  else { btn.className='btn-main running'; btn.innerHTML='⏸ Pause'; if (voiceOn) speak('Weiter.'); }
}

function skipTask() {
  if (!isRunning) return;
  clearInterval(timerInterval);
  closeSteps();
  var tasks = getTasks();
  if (curIdx < tasks.length) { if (voiceOn) speak(tasks[curIdx].task.t + ' übersprungen.'); }
  curIdx++;
  var next = getNextUndone(curIdx);
  if (next === -1) { finishAll(); return; }
  curIdx = next;
  startTask(curIdx);
}

function prevTask() {
  if (curIdx <= 0) return;
  clearInterval(timerInterval);
  closeSteps();
  curIdx = Math.max(0, curIdx-1);
  var tasks = getTasks();
  if (curIdx < tasks.length) setDone(tasks[curIdx].task.id, false, false);
  isRunning = true; isPaused = false;
  startTask(curIdx);
}

function finishAll() {
  clearInterval(timerInterval);
  isRunning = false; curIdx = -1;
  closeSteps();
  var btn = document.getElementById('btnMain');
  btn.className = 'btn-main done-all'; btn.innerHTML = '↺ Nochmal';
  document.getElementById('curTask').textContent = 'Alle Aufgaben erledigt!';
  document.getElementById('curTip').textContent = '';
  document.getElementById('timerDisp').textContent = '0:00';
  document.getElementById('timerBar').style.width = '100%';
  document.getElementById('nextLbl').textContent = '';
  document.getElementById('doneBanner').className = 'done-banner show';
  var tasks = getTasks();
  var totalM = tasks.reduce(function(s,e){ return s+e.task.m; }, 0);
  document.getElementById('doneText').textContent = 'Super! ' + totalM + ' Minuten Haushaltsblock abgeschlossen.';
  renderProgress(); renderList();
}

function toggleVoice() {
  voiceOn = !voiceOn;
  var sw = document.getElementById('voiceSw');
  sw.className = 'toggle-sw' + (voiceOn?' on':'');
  loadVoices();
  if (voiceOn && synth) { setTimeout(function(){ speak('Ansage aktiviert.'); }, 200); }
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderStrip() {
  var h=''; var ord=[1,2,3,4,5,6,0];
  ord.forEach(function(d){
    var isSel=d===selDay, isToday=d===today.getDay();
    var has = (WEEKLY[d]||[]).length > 0;
    h+='<button class="dbtn'+(isSel?' active':'')+(isToday?' today':'')+'" onclick="selD('+d+')">'
      +'<span class="dname">'+DN[d]+'</span>'
      +'<span class="dnum">'+DN[d][0]+'</span>'
      +(has?'<span class="ddot"></span>':'<span style="height:3px"></span>')
      +'</button>';
  });
  document.getElementById('ds').innerHTML = h;
}

function selD(d) {
  if (isRunning) { if(!confirm('Laufenden Block abbrechen?')) return; clearInterval(timerInterval); isRunning=false; curIdx=-1; closeSteps(); }
  selDay = d; renderStrip(); renderProgress(); renderAll();
}

function renderProgress() {
  var tasks = getTasks();
  var done = tasks.filter(function(e){ return isDone(e.task.id,false); }).length;
  var total = tasks.length;
  var pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('plbl').textContent = done + ' von ' + total + ' erledigt';
  document.getElementById('ppct').textContent = pct + '%';
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('totalMin').textContent = getTotalMin();
}

function renderList() {
  var tasks = getTasks();
  var monthly = getMonthlyForDay();
  var h = '';

  if (WAESCHE_DAYS.indexOf(selDay) >= 0) {
    var wDone = isDone(WAESCHE_TASK.id, false);
    var isCurW = isRunning && curIdx === 0;
    var hasSteps = !!STEPS[22];
    h += '<div class="section-day">🧺 Zuerst: Wäsche</div>';
    h += '<div class="task-row'+(wDone?' done-t':'')+(isCurW?' current':'')+'" onclick="'+(hasSteps?'openSteps(22)':'')+'">'
      +'<span class="tnr">1</span>'
      +'<div class="tinfo2"><div class="tname">'+WAESCHE_TASK.t+(hasSteps?'<span class="steps-badge">Schritte</span>':'')+'</div><div class="ttip2">'+WAESCHE_TASK.tip+'</div></div>'
      +'<span class="tmin2">'+WAESCHE_TASK.m+' Min</span>'
      +'</div>';
  }

  var weekly = WEEKLY[selDay] || [];
  if (weekly.length) {
    h += '<div class="section-day">Wochenschwerpunkt ' + DN[selDay] + '</div>';
    weekly.forEach(function(t, wi) {
      var done = isDone(t.id, false);
      var isCur = isRunning && curIdx === wi;
      var hasSteps = !!STEPS[t.id];
      h += '<div class="task-row'+(done?' done-t':'')+(isCur?' current':'')+'" onclick="'+(hasSteps?'openSteps('+t.id+')':'')+'">'
        +'<span class="tnr">'+(wi+1)+'</span>'
        +'<div class="tinfo2"><div class="tname">'+t.t+(hasSteps?'<span class="steps-badge">Schritte</span>':'')+'</div><div class="ttip2">'+t.tip+'</div></div>'
        +'<span class="tmin2">'+t.m+' Min</span>'
        +'</div>';
    });
  }

  h += '<div class="section-day">💨 Täglich: Lüften + Routine</div>';
  var wlen = weekly.length;
  DAILY.forEach(function(t, di) {
    var globalIdx = wlen + di;
    var done = isDone(t.id, false);
    var isCur = isRunning && curIdx === globalIdx;
    var hasSteps = !!STEPS[t.id];
    h += '<div class="task-row'+(done?' done-t':'')+(isCur?' current':'')+'" onclick="'+(hasSteps?'openSteps('+t.id+')':'')+'">'
      +'<span class="tnr">'+(wlen+di+1)+'</span>'
      +'<div class="tinfo2"><div class="tname">'+t.t+(hasSteps?'<span class="steps-badge">Schritte</span>':'')+'</div><div class="ttip2">'+t.tip+'</div></div>'
      +'<span class="tmin2">'+t.m+' Min</span>'
      +'</div>';
  });

  if (monthly.length) {
    h += '<div class="section-day" style="color:var(--p)">Monatlich</div>';
    monthly.forEach(function(t) {
      var done = isDone(t.id, true);
      var hasSteps = !!STEPS[t.id];
      h += '<div class="task-row monthly'+(done?' done-t':'')+'" onclick="'+(hasSteps?'openSteps('+t.id+')':'')+'">'
        +'<span class="tnr" style="color:var(--p)">○</span>'
        +'<div class="tinfo2"><div class="tname">'+t.t+'<span class="freq-chip">'+t.freq+'</span>'+(hasSteps?'<span class="steps-badge">Schritte</span>':'')+'</div><div class="ttip2">'+t.tip+'</div></div>'
        +'<span class="tmin2" style="color:var(--p)">~'+t.m+' Min</span>'
        +'</div>';
    });
  }

  document.getElementById('taskList').innerHTML = h;
}

function renderAll() {
  var btn = document.getElementById('btnMain');
  if (!isRunning) { btn.className='btn-main'; btn.innerHTML='▶ Start'; }
  document.getElementById('curTask').textContent = 'Tippe Start zum Beginnen';
  document.getElementById('curTip').textContent = '';
  document.getElementById('timerDisp').textContent = '0:00';
  document.getElementById('timerOf').textContent = '';
  document.getElementById('timerBar').style.width = '0%';
  document.getElementById('nextLbl').textContent = '';
  document.getElementById('doneBanner').className = 'done-banner';
  renderList();
}

// ── INIT ──────────────────────────────────────────────────────────────────
load(); renderStrip(); renderProgress(); renderAll();
</script>
</body>
</html>
