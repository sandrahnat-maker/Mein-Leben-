<style>
:root{
  --bg:#faf3e8;--white:#fffdf8;--text:#2e2010;
  --muted:rgba(20,10,0,0.62);--gold:#c8943a;--gold2:#e8b86a;
  --sage:#7a9a5a;--border:rgba(180,130,70,0.15);
}
html{font-size:18px;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--bg);color:var(--text);padding:.8rem;padding-bottom:3rem}
h1{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;font-weight:400;color:var(--text);text-align:center;margin-bottom:.3rem}
.sub{font-size:13px;color:var(--muted);font-style:italic;text-align:center;margin-bottom:.8rem}
.tabs{display:flex;gap:5px;margin-bottom:.7rem}
.tab{flex:1;padding:.5rem .3rem;border:1.5px solid var(--border);border-radius:11px;background:var(--white);font-size:13px;font-weight:400;cursor:pointer;text-align:center;color:var(--gold);font-family:'Cormorant Garamond',serif}
.tab.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.week-badge{background:linear-gradient(135deg,#fdf6e0,#f8f0d8);border:1px solid rgba(200,148,58,0.2);border-radius:11px;padding:.45rem .8rem;font-size:14px;color:var(--text);margin-bottom:.7rem;font-style:italic}
.progress-wrap{margin-bottom:.8rem}
.prog-label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:.3rem}
.prog-bar{height:5px;background:rgba(180,130,70,0.15);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--gold));border-radius:99px;transition:width .4s}
.group-hdr{border-radius:10px;padding:.5rem .8rem;margin-bottom:.4rem;font-weight:600;font-size:14px;display:flex;justify-content:space-between;font-family:'Cormorant Garamond',serif}
.item{display:flex;gap:.65rem;align-items:flex-start;background:var(--white);border-radius:12px;padding:.55rem .75rem;margin-bottom:.35rem;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(180,120,40,0.04)}
.item.done{opacity:.45}.item.done .iname{text-decoration:line-through}
.icb{width:20px;height:20px;border-radius:6px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.iname{font-size:16px;font-weight:600}
.idetail{font-size:13px;color:var(--muted);margin-top:2px;font-style:italic}
.btns{display:flex;gap:6px;margin-top:.8rem}
.btn{flex:1;background:var(--white);border:1.5px solid var(--border);color:var(--muted);border-radius:10px;padding:.5rem;font-size:14px;cursor:pointer;font-family:'Cormorant Garamond',serif}
.btn.save{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
.tip-box{background:linear-gradient(135deg,#edf5e8,#f0f5e8);border-radius:12px;padding:.7rem .9rem;border:1px solid rgba(122,154,90,0.2);margin-top:.8rem;font-size:14px;color:#4a7a2a;line-height:1.7;font-style:italic}
.main-tabs{display:flex;gap:5px;margin-bottom:.8rem}
.main-tab{flex:1;padding:.6rem .3rem;border:2px solid var(--border);border-radius:12px;background:rgba(255,253,248,.5);font-size:15px;font-weight:400;cursor:pointer;text-align:center;color:var(--muted);font-family:'Cormorant Garamond',serif}
.main-tab.on{border-color:var(--sage);color:var(--sage);background:var(--white);font-weight:600}
.brand-hdr{border-radius:12px;padding:.7rem .9rem;margin-bottom:.55rem}
.brand-title{font-weight:600;font-size:15px}
.brand-sub{font-size:13px;opacity:.85;margin-top:.15rem;font-style:italic}
.brand-where{font-size:13px;color:var(--muted);margin-top:.2rem;font-style:italic}
.pflege-app{font-size:13px;font-weight:600;margin-top:.2rem}
</style>

<h1>🛒 Meine Einkaufsliste</h1>
<p class="sub">Lebensmittel · Pflege · Beauty — mit Liebe eingekauft</p>

</div>

// Welche Wochen sind aktuell? sind aktuell? (berechne live)
function getMealWeekNum(date) {
  const kw11_2026 = new Date("2026-03-09T00:00:00");
  const diff = Math.floor((date - kw11_2026) / (7 * 864e5));
  return ((diff % 4) + 4) % 4 + 1; // 1\u20134
}

function getCurrentWeeks() {
  const now = new Date();
  // Anfang dieser Woche (Montag)
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  monday.setHours(0, 0, 0, 0);
  const nextMonday = new Date(monday);
  nextMonday.setDate(monday.getDate() + 7);

  const currentWeek = getMealWeekNum(monday);
  const nextWeek = getMealWeekNum(nextMonday);

  // Datumsbereich
  const friday = new Date(monday); friday.setDate(monday.getDate() + 6);
  const nextFriday = new Date(nextMonday); nextFriday.setDate(nextMonday.getDate() + 6);

  const fmt = d => d.toLocaleDateString("de-AT", { day: "numeric", month: "numeric" });

  return {
    currentWeek,
    nextWeek,
    currentLabel: `KW ${getKW(monday)} \u00B7 ${fmt(monday)}\u2013${fmt(friday)}`,
    nextLabel: `KW ${getKW(nextMonday)} \u00B7 ${fmt(nextMonday)}\u2013${fmt(nextFriday)}`,
  };
}

function getKW(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function getMealWeekNum(date) {
  const kw11_2026 = new Date("2026-03-09T00:00:00");
  const diff = Math.floor((date - kw11_2026) / (7 * 864e5));
  return ((diff % 4) + 4) % 4 + 1; // 1\u20134
}

function getCurrentWeeks() {
  const now = new Date();
  // Anfang dieser Woche (Montag)
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  monday.setHours(0, 0, 0, 0);
  const nextMonday = new Date(monday);
  nextMonday.setDate(monday.getDate() + 7);

  const currentWeek = getMealWeekNum(monday);
  const nextWeek = getMealWeekNum(nextMonday);

  // Datumsbereich
  const friday = new Date(monday); friday.setDate(monday.getDate() + 6);
  const nextFriday = new Date(nextMonday); nextFriday.setDate(nextMonday.getDate() + 6);

  const fmt = d => d.toLocaleDateString("de-AT", { day: "numeric", month: "numeric" });

  return {
    currentWeek,
    nextWeek,
    currentLabel: `KW ${getKW(monday)} \u00B7 ${fmt(monday)}\u2013${fmt(friday)}`,
    nextLabel: `KW ${getKW(nextMonday)} \u00B7 ${fmt(nextMonday)}\u2013${fmt(nextFriday)}`,
  };
}

function getKW(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

var EL_KEY = 'einkauf_checked_v1';
var checked = (function(){ try{ return JSON.parse(localStorage.getItem(EL_KEY)||'{}'); }catch(e){ return {}; } })();
function saveChecked(){ try{ localStorage.setItem(EL_KEY, JSON.stringify(checked)); }catch(e){} }
var mainTab = 0;
var weekTab = 'diese';
var weekInfo = getCurrentWeeks();

function getWeekNum(tab) {
  return tab === 'diese' ? weekInfo.currentWeek : weekInfo.nextWeek;
}

function switchMain(n) {
  mainTab = n;
  document.getElementById('food-section').style.display = n===0 ? '' : 'none';
  document.getElementById('pflege-section').style.display = n===1 ? '' : 'none';
  document.getElementById('mt0').className = 'main-tab' + (n===0?' on':'');
  document.getElementById('mt1').className = 'main-tab' + (n===1?' on':'');
  renderAll();
}

function switchWeek(w) {
  weekTab = w;
  document.getElementById('wt0').className = 'tab' + (w==='diese'?' on':'');
  document.getElementById('wt1').className = 'tab' + (w==='naechste'?' on':'');
  renderFood();
}

function toggleFood(wk, idx) {
  var k = 'f_'+wk+'_'+idx;
  checked[k] = !checked[k];
  saveChecked();
  renderFood();
}

function renderFood() {
  var wk = getWeekNum(weekTab);
  var lbl = weekTab === 'diese' ? weekInfo.currentLabel : weekInfo.nextLabel;
  document.getElementById('weekInfo').textContent = 'Mahlzeitenplan Woche ' + wk + ' - ' + lbl;
  var items = (ZUTATEN_WOCHE[wk] || []).concat(NEM_ITEMS || []).concat(REINIGUNGS_ITEMS || []);
  var grouped = {};
  items.forEach(function(it, i) {
    if (!grouped[it.group]) grouped[it.group] = [];
    grouped[it.group].push({item: it, idx: i});
  });
  var done = items.filter(function(_, i) { return !!checked['f_'+wk+'_'+i]; }).length;
  var pct = items.length ? Math.round(done/items.length*100) : 0;
  document.getElementById('foodCount').textContent = done + ' / ' + items.length;
  document.getElementById('foodBar').style.width = pct + '%';
  var html = '';
  GROUP_ORDER.forEach(function(g) {
    if (!grouped[g]) return;
    var gc = GROUP_COLORS[g] || {bg:'#f5f5f5',accent:'#ccc',color:'#333'};
    var gDone = grouped[g].filter(function(x){ return !!checked['f_'+wk+'_'+x.idx]; }).length;
    html += '<div class="group-hdr" style="background:'+gc.bg+';color:'+gc.color+'">';
    html += '<span>'+g+'</span><span style="font-size:.65rem;opacity:.7">'+gDone+'/'+grouped[g].length+'</span></div>';
    grouped[g].forEach(function(x) {
      var k = 'f_'+wk+'_'+x.idx;
      var d = !!checked[k];
      html += '<div class="item'+(d?' done':'')+'" onclick="toggleFood('+wk+','+x.idx+')">';
      html += '<div class="icb" style="background:'+(d?gc.color:'transparent')+';border:2px solid '+(d?gc.color:'#ccc')+'">';
      if(d) html += 'v';
      html += '</div><div><div class="iname">'+x.item.name+'</div>';
      if(x.item.detail) html += '<div class="idetail">'+x.item.detail+'</div>';
      html += '</div></div>';
    });
  });
  document.getElementById('foodList').innerHTML = html;
}

function clearDone() {
  var wk = getWeekNum(weekTab);
  Object.keys(checked).forEach(function(k){ if(k.startsWith('f_'+wk+'_')) delete checked[k]; });
  renderFood();
}

function resetWeek() {
  var wk = getWeekNum(weekTab);
  Object.keys(checked).forEach(function(k){ if(k.startsWith('f_'+wk+'_')) delete checked[k]; });
  renderFood();
}

function togglePflege(catId, idx) {
  var k = 'p_'+catId+'_'+idx;
  checked[k] = !checked[k];
  saveChecked();
  renderPflege();
}

function renderPflege() {
  var total = 0, done = 0;
  pflegeCategories.forEach(function(cat) { total += cat.items.length; cat.items.forEach(function(it,i){ if(checked['p_'+cat.id+'_'+i]) done++; }); });
  var pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pflegeCount').textContent = done + ' / ' + total;
  document.getElementById('pflegeBar').style.width = pct + '%';
  var html = '';
  pflegeCategories.forEach(function(cat) {
    html += '<div class="brand-hdr" style="background:'+cat.bg+';border:1.5px solid '+cat.accent+'">';
    html += '<div class="brand-title" style="color:'+cat.color+'">'+cat.label+'</div>';
    html += '<div class="brand-sub" style="color:'+cat.color+'">'+cat.sub+'</div>';
    html += '<div class="brand-where">&#128205; '+cat.where+'</div></div>';
    cat.items.forEach(function(it, i) {
      var k = 'p_'+cat.id+'_'+i;
      var d = !!checked[k];
      html += '<div class="item'+(d?' done':'')+'" onclick="togglePflege(\''+cat.id+'\','+i+')">';
      html += '<div class="icb" style="background:'+(d?cat.color:'transparent')+';border:2px solid '+(d?cat.color:'#ccc')+'">';
      if(d) html += 'v';
      html += '</div><div><div class="iname">'+it.name+'</div>';
      if(it.detail) html += '<div class="idetail">'+it.detail+'</div>';
      html += '<div class="pflege-app" style="color:'+cat.color+'">'+it.app+'</div>';
      html += '</div></div>';
    });
  });
  document.getElementById('pflegeList').innerHTML = html;
}

function renderAll() { renderFood(); renderPflege(); }

// Init
renderAll();
