<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gesichtsyoga</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#fdf8f2;color:#2c1a0e;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hdr{background:linear-gradient(135deg,#8B6A3E,#c4956a);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr h1{color:#fff;font-size:.95rem;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.8);font-size:.6rem;margin-top:.05rem}
.reset-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:.3rem .6rem;font-size:.65rem;cursor:pointer;font-family:inherit}

/* Progress */
.prog-bar{height:3px;background:rgba(139,106,62,.12);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,#8B6A3E,#c4956a);transition:width .4s}

/* Übungsanzeige */
.ex-card{flex:1;display:flex;flex-direction:column;padding:1rem;gap:.7rem;overflow-y:auto}

/* Illustration */
.illus{background:#fff;border-radius:16px;border:1px solid #ede4d8;padding:1rem;text-align:center;flex-shrink:0}
.face-emoji{font-size:4.5rem;line-height:1;margin-bottom:.4rem;display:block;filter:drop-shadow(0 2px 8px rgba(139,106,62,.15))}
.zone-label{font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#c4956a;margin-bottom:.3rem}
.ex-name{font-size:1.1rem;font-weight:700;color:#5a3a1a;margin-bottom:.15rem}
.ex-repeat{font-size:.75rem;font-weight:700;color:#c4956a;background:#fdf0e0;padding:.2rem .5rem;border-radius:6px;display:inline-block}

/* Timer Ring */
.timer-wrap{display:flex;justify-content:center;flex-shrink:0}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(139,106,62,.1);stroke-width:8}
.ring-fill{fill:none;stroke:#8B6A3E;stroke-width:8;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:283;transition:stroke-dashoffset .5s linear}
.ring-num{font-size:1.6rem;font-weight:700;fill:#5a3a1a;dominant-baseline:middle;text-anchor:middle}
.ring-lbl{font-size:.55rem;fill:#c4956a;dominant-baseline:middle;text-anchor:middle;letter-spacing:.06em;text-transform:uppercase}

/* Anleitung */
.instruction{background:#fff;border-radius:12px;border:1px solid #ede4d8;padding:.8rem .9rem}
.inst-title{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#c4956a;margin-bottom:.4rem}
.inst-steps{list-style:none}
.inst-steps li{font-size:.8rem;color:#3a2010;line-height:1.5;padding:.15rem 0;display:flex;gap:.5rem}
.inst-steps li::before{content:"→";color:#c4956a;flex-shrink:0}
.inst-tip{font-size:.68rem;color:#9A7A50;margin-top:.4rem;font-style:italic;line-height:1.4}

/* Buttons */
.btns{display:flex;gap:.5rem;padding:.75rem 1rem;flex-shrink:0;background:#fdf8f2}
.btn-prev{background:#fff;color:#8B6A3E;border:1.5px solid #c4956a;border-radius:10px;padding:.6rem;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:600;flex:0 0 2.8rem}
.btn-main{flex:1;background:linear-gradient(135deg,#8B6A3E,#c4956a);color:#fff;border:none;border-radius:10px;padding:.6rem 1rem;font-size:.88rem;cursor:pointer;font-family:inherit;font-weight:700;transition:all .15s}
.btn-main:active{transform:scale(.97)}
.btn-main.paused{background:linear-gradient(135deg,#c4956a,#e8b87a)}
.btn-skip{background:#fff;color:#8B6A3E;border:1.5px solid #c4956a;border-radius:10px;padding:.6rem;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:600;flex:0 0 2.8rem}

/* Übersicht Dots */
.dots{display:flex;gap:.3rem;justify-content:center;padding:.4rem 1rem;flex-shrink:0;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(139,106,62,.15);transition:all .2s;cursor:pointer}
.dot.done{background:#c4956a}
.dot.active{background:#8B6A3E;transform:scale(1.3)}

/* Fertig-Screen */
.done-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:.8rem}
.done-emoji{font-size:4rem}
.done-title{font-size:1.2rem;font-weight:700;color:#5a3a1a}
.done-sub{font-size:.78rem;color:#9A7A50;line-height:1.5}
.done-again{background:linear-gradient(135deg,#8B6A3E,#c4956a);color:#fff;border:none;border-radius:12px;padding:.6rem 1.5rem;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.5rem}

/* Intro */
.intro{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center;gap:.7rem}
.intro-emoji{font-size:3.5rem}
.intro-title{font-size:1.1rem;font-weight:700;color:#5a3a1a}
.intro-info{font-size:.75rem;color:#9A7A50;line-height:1.6;max-width:280px}
.intro-start{background:linear-gradient(135deg,#8B6A3E,#c4956a);color:#fff;border:none;border-radius:12px;padding:.7rem 2rem;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.3rem;width:100%;max-width:280px}
.ex-list{width:100%;max-width:300px;text-align:left}
.ex-list-item{display:flex;align-items:center;gap:.6rem;padding:.35rem 0;border-bottom:1px solid #ede4d8;font-size:.75rem;color:#5a3a1a}
.ex-list-item:last-child{border:none}
.ex-ico{font-size:1.1rem;flex-shrink:0}
.ex-dur{font-size:.65rem;color:#c4956a;margin-left:auto}
</style>
</head>
<body>

var synth = window.speechSynthesis;
var voice = null;
var curIdx = 0;
var sec = 0;
var interval = null;
var isRunning = false;
var isPaused = false;
var state = 'intro'; // intro | running | done

function loadVoice() {
  var voices = synth.getVoices();
  var pref = ['Anna','Helena','Katrin','Marlene','Google Deutsch'];
  for (var i=0;i<pref.length;i++) {
    var v = voices.find(function(v){ return v.name.indexOf(pref[i])>=0; });
    if (v) { voice=v; break; }
  }
  if (!voice) voice = voices.find(function(v){ return v.lang&&v.lang.startsWith('de'); });
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoice;
setTimeout(loadVoice, 500);

var speakQueue = [];
var isSpeaking = false;

function speak(txt) {
  speakQueue.push(txt);
  if (!isSpeaking) processQueue();
}

function processQueue() {
  if (speakQueue.length === 0) { isSpeaking = false; return; }
  isSpeaking = true;
  var txt = speakQueue.shift();
  try {
    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'de-DE'; u.rate = 0.9; u.volume = 1.0;
    if (voice) u.voice = voice;
    u.onend = function() { isSpeaking = false; processQueue(); };
    u.onerror = function() { isSpeaking = false; processQueue(); };
    synth.speak(u);
  } catch(e) { isSpeaking = false; processQueue(); }
}

function speakNow(txt) {
  speakQueue = []; isSpeaking = false;
  try { synth.cancel(); } catch(e) {}
  speak(txt);
}
function goIntro() {
  clearInterval(interval); isRunning=false; isPaused=false;
  curIdx=0; sec=0; state='intro';
  speakQueue=[]; isSpeaking=false; try{synth.cancel();}catch(e){} speakQueue=[]; isSpeaking=false;
  render();
}

function startTraining() {
  state='running'; curIdx=0; sec=0; isRunning=true; isPaused=false;
  render();
  speakIntro();
  startTimer();
}

function speakIntro() {
  var ex = EXERCISES[curIdx];
  speak('\u00DCbung '+(curIdx+1)+' von '+EXERCISES.length+': '+ex.name+'. '+ex.reps+'. '+ex.steps[0]);
}

function startTimer() {
  clearInterval(interval);
  interval = setInterval(function(){
    if (isPaused) return;
    sec++;
    var ex = EXERCISES[curIdx];
    var rem = Math.max(0, ex.dur - sec);
    // Live-Cues
    if (ex.cues) {
      for (var c=0; c<ex.cues.length; c++) {
        if (sec === ex.cues[c].at + 1) speak(ex.cues[c].txt);
      }
    }
    if (rem === 0) {
      clearInterval(interval);
      if (curIdx < EXERCISES.length - 1) {
        setTimeout(function(){
          curIdx++; sec=0;
          render();
          speak('Übung '+(curIdx+1)+': '+EXERCISES[curIdx].name+'. '+EXERCISES[curIdx].cues[0].txt);
          startTimer();
        }, 1500);
      } else {
        state='done';
        speakNow('Ausgezeichnet! Alle sieben Gesichtsyoga-Übungen abgeschlossen. Schön gemacht!');
        render();
      }
    }
    renderTimer();
  }, 1000);
}
function togglePause() {
  if (!isRunning) return;
  isPaused = !isPaused;
  if (isPaused) { try{synth.cancel();}catch(e){} speak('Pause.'); }
  else speak('Weiter.');
  renderTimer();
}

function skipEx() {
  if (!isRunning) return;
  clearInterval(interval);
  try{synth.cancel();}catch(e){}
  if (curIdx < EXERCISES.length-1) {
    curIdx++; sec=0;
    render();
    speak('\u00DCbung '+(curIdx+1)+': '+EXERCISES[curIdx].name+'. '+EXERCISES[curIdx].steps[0]);
    startTimer();
  } else {
    state='done'; render();
  }
}

function goToEx(i) {
  if (state!=='running') return;
  clearInterval(interval);
  try{synth.cancel();}catch(e){}
  curIdx=i; sec=0; isPaused=false;
  render();
  speak('\u00DCbung '+(i+1)+': '+EXERCISES[i].name+'. '+EXERCISES[i].steps[0]);
  startTimer();
}

function renderTimer() {
  var ex = EXERCISES[curIdx];
  var rem = Math.max(0, ex.dur - sec);
  var pct = sec / ex.dur;
  var circ = 2*Math.PI*45;
  var offset = circ*(1-pct);

  var el = document.getElementById('ringFill');
  var numEl = document.getElementById('ringNum');
  var btnMain = document.getElementById('btnMain');
  if (el) el.style.strokeDashoffset = offset;
  if (numEl) numEl.textContent = rem+'s';
  if (btnMain) {
    btnMain.textContent = isPaused ? '▶ Weiter' : '⏸ Pause';
    btnMain.className = 'btn-main'+(isPaused?' paused':'');
  }
}

function render() {
  var html = '';
  if (state==='intro') {
    html = '<div class="intro">'
      +'<div class="intro-emoji">🌸</div>'
      +'<div class="intro-title">Gesichtsyoga</div>'
      +'<div class="intro-info">'+EXERCISES.length+' Übungen · ca. 12 Minuten<br>Geführt mit Timer & Anleitung<br>Mit Sprachansagen</div>'
      +'<div class="ex-list">';
    EXERCISES.forEach(function(ex,i){
      html += '<div class="ex-list-item"><span class="ex-ico">'+ex.emoji+'</span><span>'+ex.name+'</span><span class="ex-dur">'+ex.dur+'s</span></div>';
    });
    html += '</div><button class="intro-start" onclick="startTraining()">▶ Starten</button></div>';
    document.getElementById('progFill').style.width='0%';
    document.getElementById('hdrSub').textContent = EXERCISES.length+' Übungen · ca. 12 Minuten';

  } else if (state==='done') {
    html = '<div class="done-screen">'
      +'<div class="done-emoji">✨</div>'
      +'<div class="done-title">Geschafft!</div>'
      +'<div class="done-sub">Alle '+EXERCISES.length+' Übungen abgeschlossen.<br>Dein Gesicht wird es dir danken 🌸</div>'
      +'<button class="done-again" onclick="goIntro()">↺ Nochmal</button>'
      +'</div>';
    document.getElementById('progFill').style.width='100%';

  } else {
    var ex = EXERCISES[curIdx];
    var pct = Math.round((curIdx/EXERCISES.length)*100);
    document.getElementById('progFill').style.width=pct+'%';
    document.getElementById('hdrSub').textContent = 'Übung '+(curIdx+1)+' von '+EXERCISES.length;

    // Steps als HTML
    var stepsHtml = ex.steps.map(function(s){ return '<li>'+s+'</li>'; }).join('');

    // Dots
    var dotsHtml = EXERCISES.map(function(e,i){
      var cls = i<curIdx?'done':i===curIdx?'active':'';
      return '<div class="dot '+cls+'" onclick="goToEx('+i+')"></div>';
    }).join('');

    html = '<div class="ex-card">'
      +'<div class="illus">'
      +'<span class="face-emoji">'+ex.emoji+'</span>'
      +'<div class="zone-label">'+ex.zone+'</div>'
      +'<div class="ex-name">'+ex.name+'</div>'
      +'<div style="margin-top:.3rem"><span class="ex-repeat">'+ex.reps+'</span></div>'
      +'</div>'

      +'<div class="timer-wrap">'
      +'<svg class="ring-svg" width="110" height="110" viewBox="0 0 110 110">'
      +'<circle class="ring-bg" cx="55" cy="55" r="45"/>'
      +'<circle class="ring-fill" id="ringFill" cx="55" cy="55" r="45" style="stroke-dasharray:'+2*Math.PI*45+';stroke-dashoffset:'+2*Math.PI*45+'"/>'
      +'<text class="ring-num" id="ringNum" x="55" y="50">'+ex.dur+'s</text>'
      +'<text class="ring-lbl" x="55" y="67">verbleibend</text>'
      +'</svg></div>'

      +'<div class="instruction">'
      +'<div class="inst-title">So geht\'s</div>'
      +'<ul class="inst-steps">'+stepsHtml+'</ul>'
      +(ex.tip?'<div class="inst-tip">💡 '+ex.tip+'</div>':'')
      +'</div>'
      +'</div>'

      +'<div class="dots">'+dotsHtml+'</div>'

      +'<div class="btns">'
      +'<button class="btn-prev" onclick="goToEx(Math.max(0,curIdx-1))" title="Zurück">◀</button>'
      +'<button class="btn-main" id="btnMain" onclick="togglePause()">⏸ Pause</button>'
      +'<button class="btn-skip" onclick="skipEx()" title="Überspringen">▶▶</button>'
      +'</div>';
  }

  document.getElementById('mainContent').innerHTML = html;
}

// Init
render();
</script>
</body>
</html>
