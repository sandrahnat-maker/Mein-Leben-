<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>&#128133; Nagelpflege</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f7f3ee;color:#2c2416;padding:.8rem;padding-bottom:3rem}
h1{font-size:1.1rem;font-weight:700;color:#8B6A3E;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:2px solid #e8ddd0}
.item{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem .7rem;background:#fff;border-radius:10px;margin-bottom:.4rem;border:1px solid #ede4d8;cursor:pointer;-webkit-tap-highlight-color:transparent}
.item.done{opacity:.45}.item.done .nm{text-decoration:line-through}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #c4a06a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;margin-top:.05rem;color:#fff}
.item.done .cb{background:#8B6A3E;border-color:#8B6A3E}
.nm{font-size:.88rem;font-weight:600;line-height:1.3}
.sb{font-size:.75rem;color:#9A7A50;margin-top:.12rem;line-height:1.4}
.sec{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#b8956a;margin:.8rem 0 .3rem .2rem}
.info{font-size:.72rem;color:#b8956a;background:#fdf5ec;border-radius:8px;padding:.4rem .6rem;margin-bottom:.5rem;line-height:1.5}
.reset{position:fixed;bottom:1rem;right:1rem;background:#8B6A3E;color:#fff;border:none;border-radius:20px;padding:.45rem 1.1rem;font-size:.78rem;cursor:pointer;box-shadow:0 2px 8px rgba(139,106,62,.3);font-family:inherit}
</style></head><body>
<h1>&#128133; Nagelpflege</h1>
<div id="L"></div>
<button class="reset" onclick="rst()">&#8634; Zur&#252;cksetzen</button>
<script>
var D=[{"info": "T\u00E4glich: Nagel\u00F6l + Handcreme \u00B7 So: Nagelpflege-Ritual \u00B7 3\u00D7 j\u00E4hrl: Christina"}, {"sec": "T\u00E4glich"}, {"n": "Nagel\u00F6l auftragen", "s": "Jojoba-\u00D6l \u2013 Nagelhaut sanft einmassieren"}, {"n": "Handcreme", "s": "Lavera Basis Sensitiv Handcreme"}, {"sec": "W\u00F6chentlich \u2013 So: Nagelpflege-Ritual"}, {"n": "Oliven\u00F6l-Bad", "s": "10 Min \u2013 Finger & Zehen einweichen"}, {"n": "Nagelhaut zur\u00FCckschieben", "s": "Sanft mit Orangenholzst\u00E4bchen \u2013 nie schneiden"}, {"n": "N\u00E4gel feilen", "s": "Nur in eine Richtung \u2013 leicht oval"}, {"n": "Nagel\u00F6l einmassieren", "s": "Jojoba-\u00D6l \u2013 Nagelhaut & Nagelbett"}, {"n": "Handcreme abschlie\u00DFend", "s": "Lavera Basis Sensitiv"}, {"sec": "F\u00FC\u00DFe \u2013 w\u00F6chentlich So"}, {"n": "Hornhaut bearbeiten", "s": "Bimsstein oder Hornhautfeile \u2013 nach dem Bad"}, {"n": "Fersen eincremen", "s": "Lavera Fu\u00DFcreme mit Bio-Sanddorn \u2013 dick auftragen"}, {"n": "Fu\u00DFn\u00E4gel feilen", "s": "Gerade feilen \u2013 nicht zu kurz"}, {"sec": "Monatlich"}, {"n": "N\u00E4gel schneiden (H\u00E4nde)", "s": "Gerade schneiden, dann formen"}, {"n": "N\u00E4gel schneiden (F\u00FC\u00DFe)", "s": "Gerade \u2013 Einwachsen vermeiden"}, {"sec": "Bei Christina \u2013 3\u00D7 j\u00E4hrlich"}, {"n": "Manik\u00FCre & Pedik\u00FCre", "s": "Apr / Jul / Okt \u00B7 0690/104 949 26"}];
var S={};
function tog(i){if(D[i]&&D[i].sec)return;S[i]=!S[i];rnd()}
function rst(){S={};rnd()}
function rnd(){
  var html='';
  for(var i=0;i<D.length;i++){
    var it=D[i];
    if(it.sec){html+='<div class="sec">'+it.sec+'</div>';continue;}
    if(it.info){html+='<div class="info">'+it.info+'</div>';continue;}
    var d=!!S[i];
    html+='<div class="item'+(d?' done':'')+'" onclick="tog('+i+')">';
    html+='<div class="cb">'+(d?'&#10003;':'')+'</div>';
    html+='<div><div class="nm">'+it.n+'</div>';
    if(it.s)html+='<div class="sb">'+it.s+'</div>';
    html+='</div></div>';
  }
  document.getElementById('L').innerHTML=html;
}
rnd();
</script></body></html>
