<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F5EEF8;color:#1A0E2E;padding:.75rem;padding-bottom:4rem}
h1{font-size:1.05rem;font-weight:700;color:#7B5EA7;margin-bottom:.15rem}
.sub{font-size:.65rem;color:#9b7ec8;margin-bottom:.7rem;letter-spacing:.04em}
.prog-row{display:flex;justify-content:space-between;font-size:.6rem;color:#9b7ec8;margin-bottom:.2rem}
.prog-bg{background:rgba(123,94,167,.12);border-radius:3px;height:3px;margin-bottom:.7rem;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#7B5EA7,#AB47BC);border-radius:3px;transition:width .3s}
.section{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7B5EA7;margin:.75rem 0 .35rem .05rem}
.item{background:#fff;border-radius:10px;padding:.55rem .75rem;margin-bottom:.32rem;display:flex;align-items:center;gap:.65rem;cursor:pointer;border:1px solid rgba(123,94,167,.1);transition:all .18s;-webkit-tap-highlight-color:transparent}
.item:active{transform:scale(.98)}
.item.done{opacity:.38}
.item.done .iname{text-decoration:line-through;color:#999}
.cb{width:20px;height:20px;border-radius:6px;border:1.5px solid rgba(123,94,167,.3);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item.done .cb{background:#7B5EA7;border-color:#7B5EA7}
.cbx{display:none}.item.done .cbx{display:block}
.ico{font-size:1.1rem;flex-shrink:0}
.iinfo{flex:1}
.iname{font-size:.82rem;font-weight:500;line-height:1.3}
.idesc{font-size:.67rem;color:#7a6a8a;margin-top:.05rem;line-height:1.35}
.itip{font-size:.6rem;color:#7B5EA7;margin-top:.08rem;font-style:italic}
.brand{font-size:.58rem;font-weight:700;padding:.05rem .3rem;border-radius:5px;margin-right:.3rem;vertical-align:middle}
.lavera{background:#E8F5E9;color:#2E7D32}
.benecos{background:#F3E5F5;color:#6A2E7D}
.reset-btn{position:fixed;bottom:1rem;right:1rem;background:#7B5EA7;color:#fff;border:none;border-radius:20px;padding:.38rem 1rem;font-size:.72rem;cursor:pointer;font-family:inherit}
.done-banner{background:linear-gradient(135deg,#7B5EA7,#AB47BC);border-radius:10px;padding:.7rem 1rem;margin-bottom:.7rem;text-align:center;display:none}
.done-banner.show{display:block}
.done-banner p{color:#fff;font-size:.82rem;font-weight:600}
.done-banner span{color:rgba(255,255,255,.8);font-size:.68rem}
</style>
</head>

var KEY = 'duschen_v1';
var checked = {};

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) checked = JSON.parse(raw);
    var sd = localStorage.getItem(KEY+'_d');
    var td = new Date().toISOString().slice(0,10);
    if (sd !== td) { checked = {}; save(); localStorage.setItem(KEY+'_d', td); }
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(checked)); } catch(e) {}
  try { if(window.parent) window.parent._duschen_data = JSON.stringify(checked); } catch(e) {}
}
function toggle(id) { checked[id] = !checked[id]; save(); render(); }
function resetAll() { checked = {}; save(); render(); }

function getAllItems() {
  var today = new Date().getDay();
  var all = [];
  SECTIONS.forEach(function(s){
    if (s.sunday && today !== 0) return;
    if (s.monday && today !== 1) return;
    if (s.monthly7 && new Date().getDate() !== 7) return;
    if (s.monthly7 && new Date().getDate() !== 7) return; // Peeling nur montags
    s.items.forEach(function(i){ all.push(i); });
  });
  return all;
}

function render() {
  var all = getAllItems();
  var done = all.filter(function(i){ return !!checked[i.id]; }).length;
  var total = all.length;
  var pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('plbl').textContent = done + ' von ' + total;
  document.getElementById('ppct').textContent = pct + '%';
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('doneBanner').className = 'done-banner'+(done===total&&total>0?' show':'');

  var h = '';
  SECTIONS.forEach(function(sec) {
    h += '<div class="section">'+sec.label+'</div>';
    sec.items.forEach(function(item) {
      var d = !!checked[item.id];
      h += '<div class="item'+(d?' done':'')+'" onclick="toggle(\''+item.id+'\')">'
        +'<div class="cb"><svg class="cbx" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
        +'<span class="ico">'+item.ico+'</span>'
        +'<div class="iinfo"><div class="iname">'+item.name+'</div>'
        +'<div class="idesc">'+item.desc+'</div>'
        +(item.tip?'<div class="itip">&#x1F4A1; '+item.tip+'</div>':'')
        +'</div></div>';
    });
  });
  document.getElementById('list').innerHTML = h;
}

load(); render();
</script>
